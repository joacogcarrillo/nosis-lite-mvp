<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nosis Lite</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Nosis Lite MVP</p>
          <h1>BCRA bulk checks</h1>
        </div>
        <button id="download-template" class="secondary" type="button">Download template</button>
      </header>

      <section class="workspace">
        <div class="mode-switch" role="tablist" aria-label="Input method">
          <button id="file-tab" class="mode-button active" role="tab" aria-selected="true" type="button">Upload file</button>
          <button id="paste-tab" class="mode-button" role="tab" aria-selected="false" type="button">Paste list</button>
        </div>

        <div id="file-panel" class="input-panel" role="tabpanel">
          <label id="drop-zone" class="drop-zone" for="file-input">
            <span class="drop-title">Choose an XLSX or CSV file</span>
            <span id="file-name" class="drop-meta">No file selected</span>
          </label>
          <input id="file-input" class="visually-hidden" type="file" accept=".xlsx,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
        </div>

        <div id="paste-panel" class="input-panel hidden" role="tabpanel">
          <label for="paste-input">One CUIT/CUIL per line</label>
          <textarea id="paste-input">30-71513931-2
20-42459628-1
20-33597240-7</textarea>
          <button id="load-paste" class="secondary" type="button">Load list</button>
        </div>

        <div id="validation" class="validation hidden" aria-live="polite"></div>

        <div class="actions">
          <button id="run-checks" type="button" disabled>Start checks</button>
          <span id="status" class="status">Load a file or list</span>
        </div>

        <div id="progress-wrap" class="progress-wrap hidden">
          <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
          <span id="progress-label">0 / 0</span>
        </div>
      </section>

      <section id="results" class="results hidden" aria-live="polite">
        <div class="results-header">
          <div>
            <p class="eyebrow">Completed</p>
            <h2>Results</h2>
          </div>
          <button id="download-results" type="button">Download XLSX</button>
        </div>
        <div id="result-summary" class="result-summary"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Reference</th>
                <th>CUIT/CUIL</th>
                <th>Name</th>
                <th>BCRA situation</th>
                <th>Amount</th>
                <th>Source</th>
                <th>Result</th>
              </tr>
            </thead>
            <tbody id="result-rows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/vendor/exceljs.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
